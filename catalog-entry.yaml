name: Cloudera Image Analysis

entries:
  - title: Cloudera Image Analysis
    label: cloudera-image-analysis
    short_description: |
      Verbatim OCR, document transcription, and structured extraction from images using local vision AI — powered by Qwen2.5-VL and Ollama, running entirely on-cluster.
    long_description: |
      Upload images and let local AI do the heavy lifting — no external APIs, no data leaving your cluster.

      Powered by Qwen2.5-VL and Ollama running on your CML GPU, this AMP gives you six ready-to-use analysis modes:

      - Transcribe typed or handwritten text verbatim
      - Extract every field from a form as structured data
      - Ask questions about a document and get cited answers
      - Convert any document into clean, structured JSON
      - Summarize image content in plain language

      Upload a single image for instant streaming results, or queue a batch of files to process in the background. Results are saved automatically and downloadable as a ZIP.

      ---------------------------

name: Cloudera Image Analysis
description: >
  Extract, transcribe, and analyze content from document images using local vision AI
  powered by Ollama and Qwen2.5-VL — running entirely on-cluster with no external API
  dependencies. Supports verbatim OCR, handwritten text digitization, form extraction,
  document Q&A, JSON conversion, and image summarization, with batch processing and
  a built-in job queue.
long_description: >
  This Accelerator for ML Projects (AMP) provides a production-ready image analysis
  platform that runs 100% on your CML cluster using local GPU resources.

  The default model is Qwen2.5-VL 7B — purpose-built for document understanding,
  scoring 864/1000 on OCRBench and 95.7% on DocVQA, outperforming GPT-4o-mini on
  document tasks. A 32B variant is also available for the highest fidelity.

  Output guardrails use Ollama's grammar-constrained structured output (JSON Schema
  enforced at the token-sampling level via GBNF grammars), ensuring results conform
  exactly to the expected structure without post-hoc string filtering.

  Key capabilities:
  - Verbatim typed text transcription (OCR)
  - Handwritten note digitisation
  - Structured form field extraction
  - Complex document question-answering
  - Unstructured content to JSON conversion
  - Image summarization

  Additional features:
  - Streaming token-by-token results with Stop button
  - Batch processing with background job queue
  - Folder management with per-folder result downloads
  - GPU VRAM monitoring and model pre-warming
  - Personalized UI using CML environment variables
  - Cloudera Workbench design system styling


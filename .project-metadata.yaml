name: Cloudera Image Analysis
description: >
  Extract, transcribe, and analyze content from document images using local vision AI
  powered by Ollama and Qwen2.5-VL — running entirely on-cluster with no external API
  dependencies.
author: Cloudera, Inc.
specification_version: 1.0
prototype_version: 1.0
date: "2026-03-19"

environment_variables:
  LOCAL_MODEL:
    default: "qwen2.5vl:7b"
    description: >
      Ollama vision model to use for image analysis.
      Recommended: qwen2.5vl:7b (~6 GB VRAM, best OCR quality for size).
      Higher fidelity: qwen2.5vl:32b (~21 GB VRAM, fits on L4 GPU).
      Legacy: llama3.2-vision:11b (~8 GB VRAM).
    required: false

runtimes:
  - editor: JupyterLab
    kernel: Python 3.11
    edition: Nvidia GPU

tasks:
  - type: create_job
    name: Install Dependencies
    entity_label: install_dependencies
    script: 1_session-install-dependencies/install.py
    cpu: 2
    memory: 8

  - type: run_job
    entity_label: install_dependencies

  - type: create_job
    name: Setup Models (Ollama + Qwen2.5-VL)
    entity_label: setup_models
    script: 2_setup_models/setup_models.py
    cpu: 4
    memory: 16
    gpu: 1

  - type: run_job
    entity_label: setup_models

  - type: start_application
    name: Cloudera Image Analysis
    subdomain: image-analysis
    script: 3_application/start-app.py
    cpu: 4
    memory: 16
    gpu: 1

name: Cloudera Image Analysis
description: >
  Extract, transcribe, and analyze content from images using local vision AI
  powered by Ollama. Supports typed text, handwritten text, forms, document Q&A,
  and structured JSON extraction — all running locally with no external API
  dependencies. Includes batch processing and a built-in job queue.
author: Cloudera, Inc.
specification_version: 1.0
prototype_version: 1.0
date: "2026-03-19"

environment_variables:
  LOCAL_MODEL:
    default: "llama3.2-vision:11b"
    description: >
      Ollama vision model to use for image analysis.
      Default: llama3.2-vision:11b (~7.9 GB, recommended for 4 CPU / 16 GB RAM).
      Lighter option: llava:7b (~4.7 GB).
    required: false


runtimes:
  - editor: JupyterLab
    kernel: Python 3.11
    edition: Standard

tasks:
  - type: create_job
    name: Install Dependencies
    entity_label: install_dependencies
    script: 1_session-install-dependencies/install.py
    cpu: 2
    memory: 8

  - type: run_job
    entity_label: install_dependencies

  - type: create_job
    name: Setup Local Models (Ollama + Llama 3.2 Vision)
    entity_label: setup_models
    script: 2_setup_models/setup_models.py
    cpu: 4
    memory: 16
    gpu: 1

  - type: run_job
    entity_label: setup_models

  - type: start_application
    name: Cloudera Image Analysis
    subdomain: image-analysis
    script: 3_application/start-app.py
    cpu: 4
    memory: 16
    gpu: 1
